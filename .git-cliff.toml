[changelog]
header = """
## 📋 Changelog
"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | short | trim | upper_first }} (`{{ commit.id | truncate(length=7, end="") }}`)
{% endfor %}
{% endfor %}
"""
trim = true

[git]
tag_pattern = "v[0-9]*.[0-9]*.[0-9]*"
sort = "reverse"
abbrev = 7

[[guards]]
patterns = ["^chore", "^docs", "^style", "^refactor", "^test", "^ci"]

[conventionalcommits]
conventional = true
default_varchar_mapping = "kebab-case"
