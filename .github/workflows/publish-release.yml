name: Publish Release

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  build-and-publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Python packages
        run: |
          python -m build
          ls -la dist/

      - name: Build Go restore_handler (Windows amd64)
        run: |
          cd go/restore_handler
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o restore_handler.exe main.go

      - name: Build Go restore_handler_en (Windows amd64)
        run: |
          cd go/restore_handler_en
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o restore_handler_en.exe main_en.go

      - name: Build Go restore_handler (Linux amd64)
        run: |
          cd go/restore_handler
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o restore_handler_linux main.go

      - name: Build Go restore_handler_en (Linux amd64)
        run: |
          cd go/restore_handler_en
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o restore_handler_en_linux main_en.go

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp dist/*.whl artifacts/ 2>/dev/null || true
          cp dist/*.tar.gz artifacts/ 2>/dev/null || true
          cp go/restore_handler/restore_handler.exe artifacts/ 2>/dev/null || true
          cp go/restore_handler_en/restore_handler_en.exe artifacts/ 2>/dev/null || true
          cp go/restore_handler/restore_handler_linux artifacts/ 2>/dev/null || true
          cp go/restore_handler_en/restore_handler_en_linux artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Extract version from PR title
        id: get_version
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+(\.[0-9]+)+' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.pull_request.head.ref }}"
            VERSION=$(echo "$VERSION" | grep -oE '[0-9]+(\.[0-9]+)+' | head -1)
          fi
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version extracted: $VERSION"

      - name: Get PR body for changelog
        id: pr_info
        run: |
          echo "body=${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: "Release ${{ steps.get_version.outputs.version }}"
          body: |
            ## 📦 Downloads | 下载

            ### Python Package
            - `*.whl` - Python wheel package
            - `*.tar.gz` - Source code

            ### Windows Executable
            - `restore_handler.exe` - Windows version (zh-CN)
            - `restore_handler_en.exe` - Windows version (en)

            ### Linux Executable
            - `restore_handler_linux` - Linux version (zh-CN)
            - `restore_handler_en_linux` - Linux version (en)

            ---

            ## 📝 Changes | 变更内容

            ${{ github.event.pull_request.body }}

            ---

            ## 🔧 Installation | 安装

            ### Python Package
            ```bash
            pip install endstone-easybackuper-*.whl
            ```

            ### Manual Installation
            Download the appropriate executable for your platform and place it in the server plugins directory.

            如需手动安装，请下载对应平台的执行文件并放置在服务器插件目录中。
          draft: false
          prerelease: false
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
            artifacts/*.exe
            artifacts/restore_handler_linux
            artifacts/restore_handler_en_linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
